version: "3.9"

services:
  web:
    build: .
    container_name: scifiglab
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./:/app
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
