<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初始化管理员 — SciFigLab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .init-card { max-width: 420px; width: 100%; border-radius: 1rem; box-shadow: 0 1rem 3rem rgba(0,0,0,.2); }
    </style>
</head>
<body>
    <div class="card init-card">
        <div class="card-body p-4">
            <div class="text-center mb-3">
                <i class="bi bi-shield-lock-fill text-primary" style="font-size:3rem"></i>
                <h3 class="mt-2">SciFigLab</h3>
                <p class="text-muted mb-0">首次部署 — 创建管理员账号</p>
            </div>
            <div class="alert alert-info py-2" style="font-size:0.85rem">
                <i class="bi bi-info-circle"></i> 此页面仅在首次部署时可用，创建管理员后将自动关闭。
            </div>
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" placeholder="admin" required>
            </div>
            <div class="mb-3">
                <label class="form-label">邮箱</label>
                <input type="email" class="form-control" id="email" placeholder="admin@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" class="form-control" id="password" placeholder="至少6位" required>
            </div>
            <div class="mb-3">
                <label class="form-label">确认密码</label>
                <input type="password" class="form-control" id="password2" placeholder="再次输入密码" required>
            </div>
            <button class="btn btn-primary w-100" id="initBtn"><i class="bi bi-shield-check"></i> 创建管理员</button>
            <div id="initMsg" class="mt-2"></div>
        </div>
    </div>
    <script>
    document.getElementById('initBtn').addEventListener('click', async function() {
        var pw = document.getElementById('password').value;
        if (pw !== document.getElementById('password2').value) {
            document.getElementById('initMsg').innerHTML = '<div class="alert alert-danger py-1">两次密码不一致</div>';
            return;
        }
        this.disabled = true;
        var resp = await fetch('/api/admin/init', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: pw,
            }),
        });
        var d = await resp.json();
        if (d.ok) {
            document.getElementById('initMsg').innerHTML = '<div class="alert alert-success py-1"><i class="bi bi-check-circle"></i> '+d.msg+'</div>';
            setTimeout(function(){ window.location.href = '/login'; }, 1500);
        } else {
            document.getElementById('initMsg').innerHTML = '<div class="alert alert-danger py-1">'+(d.detail||d.msg)+'</div>';
            this.disabled = false;
        }
    });
    </script>
</body>
</html>
