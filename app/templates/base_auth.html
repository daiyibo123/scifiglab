<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SciFigLab{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', path='img/favicon.svg') }}" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        }
        .auth-wrapper { max-width: 440px; width: 100%; padding: 1rem; }
        .auth-card { border-radius: 1rem; box-shadow: 0 1rem 3rem rgba(0,0,0,.2); border: none; }
        .auth-brand { text-align: center; margin-bottom: 1.5rem; }
        .auth-brand img { height: 48px; margin-bottom: 0.5rem; }
        .auth-brand h4 { color: #fff; font-weight: 700; margin: 0; }
        .auth-brand p { color: #94a3b8; font-size: 0.85rem; margin: 0; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-brand">
            <a href="/"><img src="{{ url_for('static', path='img/favicon.svg') }}" alt="logo"></a>
            <h4>SciFigLab</h4>
            <p>实验数据可视化图生成平台</p>
        </div>
        <div class="card auth-card">
            <div class="card-body p-4">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
