<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#g1)"/>
  <!-- Flask body -->
  <path d="M24 16 h16 v8 l8 18 a4 4 0 0 1 -3.6 5.4 H19.6 a4 4 0 0 1 -3.6 -5.4 l8 -18 z" fill="rgba(255,255,255,0.9)" stroke="none"/>
  <!-- Flask neck -->
  <rect x="26" y="12" width="12" height="6" rx="1" fill="rgba(255,255,255,0.9)"/>
  <!-- Liquid -->
  <path d="M21 38 q5.5 -4 11 0 q5.5 4 11 0 L44.4 42.4 a4 4 0 0 1 -3.6 5 H23.2 a4 4 0 0 1 -3.6 -5 z" fill="url(#g2)" opacity="0.7"/>
  <!-- Bubbles -->
  <circle cx="28" cy="36" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="35" cy="33" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="32" cy="38" r="1" fill="rgba(255,255,255,0.3)"/>
  <!-- Chart line on flask -->
  <polyline points="22,40 28,35 33,38 38,32 42,36" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
